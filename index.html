<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Sala interactiva</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <div id="pantalla-carga">
    <div id="barra-carga-contenedor">
      <div id="barra-carga"></div>
    </div>
  </div>

  <div id="stage-wrapper">
    <div id="stage">
      <!-- Fondo estático con su ruta correcta en img/ -->
      <img id="fondo" src="img/fondoestatico.png" alt="" draggable="false">

      <div id="capa-objetos"></div>
      <div id="overlay-oscuro"></div>
    </div>
  </div>

  <div id="modal" aria-hidden="true">
    <div id="modal-fondo"></div>
    <div id="modal-contenido">
      <button id="modal-cerrar" aria-label="Cerrar">×</button>
      <div id="modal-marco-foto">
        <img id="modal-foto" src="" alt="Fotografía">
      </div>
      <div id="modal-carta">
        <p id="modal-carta-texto"></p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
