<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aniversario - Prueba de Zoom Fluido</title>
<style>
  /* Reset básico para que parezca una app nativa */
  body, html {
    margin: 0; padding: 0; 
    width: 100%; height: 100%;
    overflow: hidden; 
    font-family: sans-serif;
    background-color: #111; color: white;
    touch-action: none; /* Evita que la pantalla haga scroll al tocar */
  }

  #game-container {
    position: relative; 
    width: 100vw; height: 100vh;
  }

  /* LA HABITACIÓN (Aquí irá tu dibujo de fondo en el futuro) */
  #room-view {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #4f4c82, #2a2845); 
    position: relative;
    /* Aquí ocurre la magia de la fluidez: */
    transition: transform 0.8s ease-in-out, opacity 0.3s ease;
  }

  /* LOS OBJETOS (Cajas de colores de prueba) */
  .interactive-object {
    position: absolute;
    width: 70px; height: 70px;
    border-radius: 12px;
    display: flex; justify-content: center; align-items: center;
    font-weight: bold; font-size: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  }
  
  /* Posicionamos el Xbox abajo a la izquierda, y la PC arriba a la derecha */
  #obj-xbox { top: 65%; left: 15%; background: #107C10; }
  #obj-pc { top: 20%; left: 65%; background: #00A4EF; }

  /* LOS MINIJUEGOS (Ocultos por defecto) */
  .minigame-view {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(15, 15, 25, 0.98);
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
    padding: 20px; box-sizing: border-box;
    /* Efecto de aparición */
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }

  .minigame-view.active {
    opacity: 1; pointer-events: auto;
  }

  button {
    margin-top: 30px; padding: 12px 24px;
    background: #fff; color: #000; border: none;
    border-radius: 8px; font-weight: bold; font-size: 16px;
  }
</style>
</head>
<body>

<div id="game-container">
  
  <!-- 1. ESCENARIO CENTRAL -->
  <div id="room-view">
    <div class="interactive-object" id="obj-xbox">XBOX</div>
    <div class="interactive-object" id="obj-pc">PC</div>
  </div>

  <!-- 2. PANTALLA MINIJUEGO XBOX -->
  <div class="minigame-view" id="minigame-xbox">
    <h2>📦 Loot Drop de Apex</h2>
    <p>Aquí pondremos la animación para abrir la caja de suministros.</p>
    <button onclick="volverHabitacion()">Cerrar Inventario</button>
  </div>

  <!-- 3. PANTALLA MINIJUEGO PC -->
  <div class="minigame-view" id="minigame-pc">
    <h2>🎮 Selección de Leyenda</h2>
    <p>Stats de mi persona favorita (Paciencia nivel 99).</p>
    <button onclick="volverHabitacion()">Volver al Hub</button>
  </div>

</div>

<script>
  const roomView = document.getElementById('room-view');
  const objects = document.querySelectorAll('.interactive-object');
  const minigames = document.querySelectorAll('.minigame-view');
  let isZoomed = false; // Candado para evitar errores si toca varias veces rápido

  objects.forEach(obj => {
    obj.addEventListener('click', (e) => {
      if (isZoomed) return; 
      isZoomed = true;

      // 1. Calculamos dinámicamente el centro del objeto que tocó
      const rect = obj.getBoundingClientRect();
      const originX = rect.left + (rect.width / 2);
      const originY = rect.top + (rect.height / 2);

      // 2. Movemos el "ojo de la cámara" a esas coordenadas y hacemos Zoom 4x
      roomView.style.transformOrigin = `${originX}px ${originY}px`;
      roomView.style.transform = 'scale(4)';

      // 3. Esperamos 800ms (lo que dura la transición CSS) para mostrar el minijuego
      const targetMinigameId = obj.id.replace('obj-', 'minigame-');
      setTimeout(() => {
        roomView.style.opacity = '0'; // Oscurecemos la habitación
        document.getElementById(targetMinigameId).classList.add('active'); // Mostramos interfaz
      }, 800); 
    });
  });

  function volverHabitacion() {
    // 1. Escondemos el minijuego activo
    minigames.forEach(mg => mg.classList.remove('active'));

    // 2. Devolvemos la visibilidad a la habitación
    roomView.style.opacity = '1';

    // 3. Quitamos el zoom sutilmente (regresa a scale 1)
    setTimeout(() => {
      roomView.style.transform = 'scale(1)';
      isZoomed = false; // Quitamos el candado
    }, 100); 
  }
</script>

</body>
</html>
